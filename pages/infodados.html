<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Publicações Científicas - CEGESP</title>

		<link
			rel="shortcut icon"
			href="assets/images/logo-cegesp-oficial-removebg-preview.png"
			type="image/x-icon"
		/>
		<link rel="stylesheet" href="/styles/global.css" />
		<link rel="stylesheet" href="/styles/media-queries/medias-queries.css" />
		<link rel="stylesheet" href="/styles/infodados/infodados.css" />
	</head>
	<body>
		<my-header></my-header>

		<main>
			<h2>Acesso aos documentos oficiais</h2>

			<form action="">
				<div class="section-level">
					<label for="level">Esfera:</label>
					<select id="level" name="level">
						<option disabled selected>Selecione a esfera</option>
						<option value="Federal">Federal</option>
						<option value="State">Estadual</option>
						<option value="Municipal">Municipal</option>
					</select>
				</div>

				<div class="section-state">
					<label for="state">UF</label>
					<select id="state" name="state">
						<option value="ba">BA</option>
						<option value="df">DF</option>
						<option value="mg">MG</option>
					</select>
				</div>

				<!-- ============================= AGRUPAMENTO =============================== -->
				<div class="section-grouping">
					<h3>Agrupamento:</h3>
					<input type="radio" id="municipality-search" name="radio-grounping" value="municipality" />
					<label for="municipality-search">Pesquisa por município</label>
	
					<input type="radio" id="territory-search" name="radio-grounping" value="territory" />
					<label for="territory-search">Pesquisa por território</label>
				</div>
	
				<div class="section-municipality">
					<label for="municipality">Municipio</label>
					<select id="municipality" name="municipality">
						<option value="jequie">Jequie</option>
						<option value="conquista">Vitoria da Conquista</option>
						<option value="itagi">Itagi</option>
					</select>
				</div>
	
				<div class="section-territory">
					<label for="territory">Território</label>
					<select id="territory" name="territory">
						<option value="ba">BA</option>
						<option value="df">DF</option>
						<option value="mg">MG</option>
					</select>
				</div>

				<div class="section-agenda">
					<h3>Agenda</h3>
					<div class="executivo">
						<input type="radio" id="executive" name="radio-agenda" value="executive" />
						<label for="executive">Poder Executivo</label>
					</div>
					<div class="legislativo">
						<input id="legislative" type="radio" name="radio-agenda" value="legislative" />
						<label for="legislative">Poder Legislativo</label>
					</div>
					<div class="judiciario">
						<input id="judicial" type="radio" name="radio-agenda" value="judicial" />
						<label for="judicial">Poder Judiciario</label>
					</div>
				</div>

				<div class="section-document">
					<label for="document">Tipo de documento:</label>
					<select id="document" name="documento" aria-label="Tipo de documento">
						<option value="loa">LOA</option>
						<option value="ldo">LDO</option>
						<option value="ppa">PPA</option>
						<option value="termo_posse">Termo Posse (Agenda retórica)</option>
						<option value="decretos">Decretos</option>
						<option value="plano_governo">Plano de governo</option>
						<option value="msg_anual">MSG Anual</option>
					</select>
				</div>

				<div class="section-period">
					<h3>Período</h3>
					<label for="start-date">Início:</label>
					<input type="date" id="start-date" name="start-date" />
	
					<label for="end-date">Fim:</label>
					<input type="date" id="end-date" name="end-date" />
				</div>

				<button type="submit">Buscar</button>
			</form>

			<section class="section-result"></section>
		</main>

		<my-footer></my-footer>

		<script type="module" src="/main.js"></script>
		<script src="/scripts/infodados.js"></script>
	</body>
</html>
