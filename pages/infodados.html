		<link

		<link rel="stylesheet" href="/styles/global.css" />

	<body>
		<my-header></my-header>

		<main>
			<h2>Acesso aos documentos oficiais - Federal</h2>

			<div class="esfera">
				<label for="esfera">Esfera:</label>
				<select name="esfera" id="esfera">
					<option value="federal">Federal</option>
					<option value="estadual">Estadual</option>
					<option value="municipal">Municipal</option>
				</select>
			</div>

			<div class="agenda">
				<h3>Agenda</h3>
				<div class="executivo">
					<input type="radio" name="executivo" id="executivo" />
					<label for="executivo">Poder Executivo</label>
				</div>
				<div class="legislativo">
					<input type="radio" name="legislativo" id="legislativo" />
					<label for="legislativo">Poder Legislativo</label>
				</div>
				<div class="judiciario">
					<input type="radio" name="judiciario" id="judiciario" />
					<label for="judiciario">Poder Judiciario</label>
				</div>
			</div>

			<div class="documento">
				<label for="documento">Tipo de documento:</label>
				<select name="documento" aria-label="Tipo de documento">
					<option value="loa">LOA</option>
					<option value="ldo">LDO</option>
					<option value="ppa">PPA</option>
					<option value="termo_posse">Termo Posse (Agenda retórica)</option>
					<option value="decretos">Decretos</option>
					<option value="plano_governo">Plano de governo</option>
					<option value="msg_anual">MSG Anual</option>
				</select>
			</div>

			<div class="periodo">
				<h3>Período</h3>
				<label for="start-date">Início:</label>
				<input type="date" id="start-date" name="start-date" />

				<label for="end-date">Fim:</label>
				<input type="date" id="end-date" name="end-date" />
			</div>

			<button>Buscar</button>
		</main>
